<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="marinersTeal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005C5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A0A0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0C2C56" stroke="#005C5C" stroke-width="3"/>
  
  <!-- Trident design -->
  <g transform="translate(50,50)">
    <!-- Central prong -->
    <rect x="-1.5" y="-30" width="3" height="35" fill="url(#marinersTeal)"/>
    <polygon points="-4,-30 0,-40 4,-30" fill="url(#marinersTeal)"/>
    
    <!-- Left prong -->
    <rect x="-11.5" y="-25" width="3" height="30" fill="url(#marinersTeal)"/>
    <polygon points="-14,-25 -10,-35 -6,-25" fill="url(#marinersTeal)"/>
    
    <!-- Right prong -->
    <rect x="8.5" y="-25" width="3" height="30" fill="url(#marinersTeal)"/>
    <polygon points="6,-25 10,-35 14,-25" fill="url(#marinersTeal)"/>
    
    <!-- Handle -->
    <rect x="-2" y="5" width="4" height="25" fill="#C4CED4" stroke="#005C5C" stroke-width="0.5"/>
    
    <!-- Crossguard -->
    <rect x="-8" y="3" width="16" height="3" rx="1.5" fill="#C4CED4" stroke="#005C5C" stroke-width="0.5"/>
  </g>
</svg>
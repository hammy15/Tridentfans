<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="compassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#005C5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A0A0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0C2C56" stroke="#005C5C" stroke-width="3"/>
  
  <!-- Compass rose design -->
  <g transform="translate(50,50)">
    <!-- Main compass points (N,S,E,W) -->
    <polygon points="0,-35 -4,-25 0,-20 4,-25" fill="url(#compassGradient)"/>
    <polygon points="35,0 25,-4 20,0 25,4" fill="url(#compassGradient)"/>
    <polygon points="0,35 4,25 0,20 -4,25" fill="url(#compassGradient)"/>
    <polygon points="-35,0 -25,4 -20,0 -25,-4" fill="url(#compassGradient)"/>
    
    <!-- Secondary compass points (NE,SE,SW,NW) -->
    <polygon points="25,-25 20,-20 15,-25 20,-30" fill="#C4CED4"/>
    <polygon points="25,25 30,20 25,15 20,20" fill="#C4CED4"/>
    <polygon points="-25,25 -20,30 -25,35 -30,20" fill="#C4CED4"/>
    <polygon points="-25,-25 -30,-20 -25,-15 -20,-20" fill="#C4CED4"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="8" fill="#0C2C56" stroke="url(#compassGradient)" stroke-width="2"/>
    <circle cx="0" cy="0" r="3" fill="url(#compassGradient)"/>
    
    <!-- "M" in center -->
    <text x="0" y="3" font-family="Arial, sans-serif" font-size="8" font-weight="bold" text-anchor="middle" fill="#0C2C56">M</text>
  </g>
</svg>